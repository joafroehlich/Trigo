<pre><b><p class ="Aufgabe">Aufgabe 16

Wie groß ist AB in dem gleichschenkligen Dreieck? 
 
<img src="Aufgabe16.jpg" >

Das Dreieck ADC ist rechtwinklig. 
Die Höhe halbiert die Grundseite AB.

AD = AB/2

            AD     
cos 50° = -----| *AC
            AC    

cos 50° * AC = AD 

AD = 0,6428 * 3,5 cm = 2,25 cm

<span style="color:red;">AB</span> = 2 * AD = 2 * 2,25 cm <span style="color:red;">= 4,5 cm</span>
