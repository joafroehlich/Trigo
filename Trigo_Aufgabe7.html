<pre><b><p class ="Aufgabe">Aufgabe 7

Wie groß sind β und b, wenn a = 6,7 cm und 
c = 8,3 cm? 

<img src="Aufgabe1.jpg" >

         a     6,7 cm
cos β = --- = --------- = 0,8072 --> β = 36,2°
         c     8,3 cm

Pythagoras:

a<sup>2</sup> + b<sup>2</sup> = c<sup>2</sup> |-a<sup>2</sup>

b<sup>2</sup> = c<sup>2</sup> - a<sup>2</sup>

b<sup>2</sup> = 8,3<sup>2</sup> cm<sup>2</sup> - 6,7<sup>2</sup> cm<sup>2</sup> = 24 cm<sup>2</sup>

<span style="color:red;">b</span> = √24 cm<sup>2</sup> <span style="color:red;">= 4,9 cm</span>
