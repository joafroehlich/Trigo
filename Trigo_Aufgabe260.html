<pre><b><p class ="Aufgabe">Aufgabe 260

sin 2x = cos x     

2 * sin x * cos x = cos x | -cos x

2 * sin x * cos x – cos x = 0

cos x * (2 * sin x – 1) = 0

cos x = 0 --> x = 90°

2 * sin x – 1 = 0 |+1

2 * sin x = 1 |:2

sin x = 0,5 --> x = 30° oder 150°

Lösungsmenge <span style="color:red;">L = {30°, 90°, 150°} </span>
