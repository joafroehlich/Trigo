<pre><b><p class ="Aufgabe">Aufgabe 142

Berechnen Sie die Länge der Diagonalen f, 
wenn a = 3,9 cm, b = 2,1 cm und α = 47°. 
 
<img src="Aufgabe142.jpg" > 

Fall SSS. 

Cosinussatz:

f<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup> - 2 * a * b * cos α

f<sup>2</sup> = 3,9<sup>2</sup> + 2,1<sup>2</sup> - 2 * 3,9 * 2,1 * cos 47°

f<sup>2</sup> = 3,9<sup>2</sup> + 2,1<sup>2</sup> - 2 * 3,9 * 2,1 * 0,682

f<sup>2</sup> = 8,4 cm<sup>2</sup> | √

<span style="color:red;">f = 2,9 cm</span>
